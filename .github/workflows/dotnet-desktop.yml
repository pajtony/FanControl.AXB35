name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Prepare reference DLLs
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path lib -Force | Out-Null
        curl -sL -o FanControl.zip "https://github.com/Rem0o/FanControl.Releases/releases/download/V271/FanControl_271_net_4_8.zip"
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $zip = [System.IO.Compression.ZipFile]::OpenRead("FanControl.zip")
        $zip.Entries | Where-Object { $_.Name -in @("FanControl.Plugins.dll","LibreHardwareMonitorLib.dll") } | ForEach-Object {
          [System.IO.Compression.ZipFileExtensions]::ExtractToFile($_, "lib/$($_.Name)", $true)
        }
        $zip.Dispose()

    - name: Build
      run: dotnet build FanControl.AXB35.csproj -c Release

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: FanControl.AXB35
        path: bin/Release/net8.0/FanControl.AXB35.dll
